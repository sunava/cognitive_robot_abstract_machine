name: krrood Docs Preview

# Builds ONLY the krrood Jupyter-Book docs for this feature branch and deploys them to the fork's
# GitHub Pages, so reviewers can read the rendered documentation instead of raw markdown. This is
# independent of the 5-library `Build Documentation` aggregate so it does not depend on the heavier
# (ROS-container) legs.
#
# One-time setup: enable Pages on the fork — Settings → Pages → Source: "GitHub Actions".
# After a successful run the docs are at:
#   https://<owner>.github.io/cognitive_robot_abstract_machine/
#   (e.g. the verbalization page at  eql/user/verbalization.html)

on:
  push:
    branches:
      - claude/eql-verbalization-refactor-OHd8j
  workflow_dispatch: {}

# Serialize Pages deployments so concurrent runs do not race.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Initialize submodules explicitly
        run: |
          git config --global --add safe.directory "*"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install graphviz libgraphviz-dev -y

      - name: Install dependencies
        run: |
          # Mirror the reusable doc build: uv resolves the workspace editable and the doc tooling
          # comes from the root project's "doc" extra; pygraphviz needs the apt headers above.
          pip install -U pip uv
          uv sync --extra doc
          uv pip install pybind11 pygraphviz

      - name: Build the krrood book
        run: uv run --no-sync jupyter-book build krrood/doc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: krrood/doc/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
