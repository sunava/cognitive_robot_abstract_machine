<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Placement Pattern</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="title">
      <h1>Placement Pattern</h1>
      <span id="demo-badge" class="demo-badge" hidden>Demo data</span>
    </div>
    <div id="recipe-buttons" class="recipe-buttons"><!-- filled by JS --></div>
  </header>

  <main>
    <section class="stage">
      <canvas id="canvas"></canvas>
    </section>

    <aside class="panel">
      <div class="readout">
        <div class="big" id="count">–</div>
        <div class="sub">Parts in the box</div>
      </div>

      <div class="control">
        <label>Offset X <span id="offset-x-value" class="val">0 mm</span></label>
        <input id="offset-x" type="range" min="0" max="0" value="0" step="1">
      </div>

      <div class="control">
        <label>Offset Y <span id="offset-y-value" class="val">0 mm</span></label>
        <input id="offset-y" type="range" min="0" max="0" value="0" step="1">
      </div>

      <button id="reset" class="reset">Reset</button>

      <div class="meta" id="meta"></div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
